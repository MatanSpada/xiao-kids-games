name: Build XIAO SAMD21 Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Add Seeed SAMD board package
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://files.seeedstudio.com/arduino/package_seeeduino_boards_index.json
          arduino-cli core update-index

      - name: Install Seeed SAMD core
        run: |
          arduino-cli core install Seeeduino:samd

      - name: Show available XIAO boards
        run: |
          arduino-cli board listall | grep -i xiao || true

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn Seeeduino:samd:seeed_XIAO_m0 \
            --output-dir build \
            simon_game

      - name: List build output
        run: |
          ls -lah build

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiao-simon-game-firmware
          path: |
            build/*.uf2
            build/*.bin
            build/*.elf
            build/*.hex
